<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nav - Beneficios (demo)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #111;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 240px;
      background: #171717;
      display: flex;
      flex-direction: column;
      color: #fff;
    }

    /* Header del sidebar */
    .sidebar-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 20px 16px 18px;
    }
    .sidebar-head .logo {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.3px;
    }
    .sidebar-head .logo span { color: #fe004e; }

    /* Navegación */
    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: 4px 10px;
      display: flex;
      flex-direction: column;
    }

    /* ---- Items principales ---- */
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      color: #a3a3a3;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }
    .nav-item:hover {
      background: rgba(255,255,255,0.04);
      color: #ddd;
    }
    .nav-item.active {
      background: rgba(254,0,78,0.15);
      color: #fff;
    }

    /* Icono SVG a la izquierda */
    .nav-item svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
      flex-shrink: 0;
    }

    /* Flecha indicadora a la derecha */
    .nav-item .arrow {
      margin-left: auto;
      font-size: 12px;
      color: #555;
      transition: transform 0.25s ease;
      display: inline-block;
    }
    .nav-item .arrow.open {
      transform: rotate(180deg);
    }

    /* ---- Submenú (collapsible) ---- */
    .nav-sub {
      padding: 0 10px 0 42px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease, padding 0.35s ease;
    }
    .nav-sub.open {
      max-height: 220px;
      padding: 2px 10px 8px 42px;
    }

    /* Sub-items */
    .nav-sub-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12.5px;
      font-weight: 400;
      color: #888;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }
    .nav-sub-item:hover {
      background: rgba(255,255,255,0.04);
      color: #fff;
    }
    .nav-sub-item.active {
      color: #fff;
      background: rgba(254,0,78,0.12);
      font-weight: 500;
    }

    /* Icono en sub-items */
    .nav-sub-item svg {
      width: 15px;
      height: 15px;
      fill: currentColor;
      flex-shrink: 0;
    }

    /* ---- Separador ---- */
    .sidebar-divider {
      height: 1px;
      background: rgba(255,255,255,0.06);
      margin: 12px 12px 8px;
    }

    /* ---- Zona de ayuda (sidebar-bottom) ---- */
    .sidebar-bottom {
      padding: 8px 10px 14px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .sidebar-bottom-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      color: #a3a3a3;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }
    .sidebar-bottom-item:hover {
      background: rgba(255,255,255,0.04);
      color: #ddd;
    }
    .sidebar-bottom-item svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar">
    <div class="sidebar-head">
      <div class="logo"><span>E</span>VA</div>
    </div>

    <nav class="sidebar-nav">

      <!-- Elemento: Inicio -->
      <div class="nav-item active">
        <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        Inicio
      </div>

      <!-- Elemento: Beneficios (con flecha + submenú) -->
      <div class="nav-item" id="beneficiosToggle">
        <!-- Icono de cuadrícula (grid) -->
        <svg viewBox="0 0 24 24"><path d="M4 8h4V4H4v4zm6 12h4v-4h-4v4zm-6 0h4v-4H4v4zm0-6h4v-4H4v4zm6 0h4v-4h-4v4zm6-10v4h4V4h-4zm-6 4h4V4h-4v4zm6 6h4v-4h-4v4zm0 6h4v-4h-4v4z"/></svg>
        Beneficios
        <span class="arrow">▾</span>
      </div>

      <!-- Submenú de Beneficios -->
      <div class="nav-sub" id="beneficiosSub">
        <!-- Mis referidos -->
        <div class="nav-sub-item">
          <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          Mis referidos
        </div>
        <!-- Reserva de espacios -->
        <div class="nav-sub-item">
          <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          Reserva de espacios
        </div>
        <!-- Orientación psicológica -->
        <div class="nav-sub-item">
          <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          Orientación psicológica
        </div>
        <!-- Becas -->
        <div class="nav-sub-item">
          <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          Becas
        </div>
      </div>

      <!-- Elemento: Guía del estudiante -->
      <div class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
        Guía del estudiante
      </div>

      <!-- Elemento: Encuestas -->
      <div class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/></svg>
        Encuestas
      </div>
    </nav>

    <!-- Sidebar bottom: Ayuda -->
    <div class="sidebar-bottom">
      <div class="sidebar-bottom-item" id="helpSidebar">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/></svg>
        Ayuda
      </div>
    </div>
  </aside>

  <script>
    (function () {
      'use strict';

      /* ============================================
         BENEFICIOS — Toggle accordion
         ============================================ */

      // 1. Obtener referencias al toggle y al submenú
      var toggle = document.getElementById('beneficiosToggle');
      var sub = document.getElementById('beneficiosSub');
      var arrow = toggle ? toggle.querySelector('.arrow') : null;

      // 2. Si existe el submenú, abrirlo automáticamente cuando
      //    uno de sus hijos tenga clase "active" (en páginas hijas)
      if (sub) {
        var hasActive = sub.querySelector('.nav-sub-item.active');
        if (hasActive) {
          sub.classList.add('open');
          if (arrow) arrow.classList.add('open');
        }
      }

      // 3. Click en "Beneficios" → toggle open/close
      if (toggle) {
        toggle.addEventListener('click', function (e) {
          // Evitar que el evento se propague a otros handlers
          e.stopPropagation();

          // Alternar clase .open en el submenú
          if (sub) {
            sub.classList.toggle('open');
          }
          // Rotar la flecha
          if (arrow) {
            arrow.classList.toggle('open');
          }
        });
      }
    })();
  </script>

</body>
</html>
